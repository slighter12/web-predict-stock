[project]
name = "quant-platform"
version = "0.1.0"
description = "Personal Quantitative Research Platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "pandas",
    "sqlalchemy",
    "requests",
    "yfinance",
    "vectorbt",
    "xgboost",
    "scikit-learn",
    "statsmodels",
    "psycopg2-binary",
]

[project.optional-dependencies]
dev = [
    "pytest",
]
